[build]
  command = "npm run build"
  publish = "dist"

# Force canonical: non-www HTTPS (fixes Google Search Console redirect warnings)
[[redirects]]
  from = "https://www.tobyonfitnesstech.com/*"
  to = "https://tobyonfitnesstech.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.tobyonfitnesstech.com/*"
  to = "https://tobyonfitnesstech.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://tobyonfitnesstech.com/*"
  to = "https://tobyonfitnesstech.com/:splat"
  status = 301
  force = true

# WordPress artifact redirects (301 permanent)
[[redirects]]
  from = "/comments/feed/"
  to = "/rss.xml"
  status = 301

[[redirects]]
  from = "/feed/"
  to = "/rss.xml"
  status = 301

[[redirects]]
  from = "/feed"
  to = "/rss.xml"
  status = 301

[[redirects]]
  from = "/blog/rss.xml"
  to = "/rss.xml"
  status = 301

[[redirects]]
  from = "/503"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-admin"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-content/*"
