name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build with Astro
        run: npm run build
        working-directory: frontend
        env:
          SITE: https://tobyonfitnesstech.com

      - name: Submit to IndexNow
        run: |
          echo "Submitting sitemap to Bing IndexNow..."
          curl -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "tobyonfitnesstech.com",
              "key": "21df5f0e15ba46c9ba198d5c8c3d53c6",
              "sitemap": "https://tobyonfitnesstech.com/sitemap-index.xml"
            }' || echo "IndexNow submission failed (non-critical)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
