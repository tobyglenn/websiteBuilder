name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build with Astro
        run: npm run build
        working-directory: frontend
        env:
          SITE: https://tobyonfitnesstech.com

      - name: Submit to IndexNow
        run: |
          echo "Submitting sitemap to Bing IndexNow..."
          curl -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "tobyonfitnesstech.com",
              "key": "21df5f0e15ba46c9ba198d5c8c3d53c6",
              "sitemap": "https://tobyonfitnesstech.com/sitemap-index.xml"
            }' || echo "IndexNow submission failed (non-critical)"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "deploy: ${{ github.sha }}"
