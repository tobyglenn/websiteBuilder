name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  # GitHub Pages actions have not all shipped Node 24-native majors yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build with Astro
        run: npm run build
        working-directory: frontend
        env:
          SITE: https://tobyonfitnesstech.com

      - name: Submit to IndexNow
        run: |
          echo "Submitting sitemap to Bing IndexNow..."
          curl -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "tobyonfitnesstech.com",
              "key": "21df5f0e15ba46c9ba198d5c8c3d53c6",
              "sitemap": "https://tobyonfitnesstech.com/sitemap-index.xml"
            }' || echo "IndexNow submission failed (non-critical)"

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory frontend/dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
          gzip --force "$RUNNER_TEMP/artifact.tar"

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar.gz
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
